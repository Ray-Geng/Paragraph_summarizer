<!DOCTYPE html>
<html>
<body>
    <script>
        const key = "AQ." + "Ab8RN6IAc8s55CP_19A_3F586MwdkDklPWt8p5dG_acESRZWRA";
        const input = prompt("Enter paragraph:");
        
        if (input) {
            document.write("Loading...");
            fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Generate a summary, extract key words, generate 3-5 questions, and suggest next learning steps from the paragraph. Keep it in raw text and avoid complicated words. " + input }] }]
                })
            })
            .then(res => res.json())
            .then(data => {
                document.body.innerHTML = `<pre>${data.candidates[0].content.parts[0].text}</pre>`;
            })
            .catch(err => document.body.innerHTML = "Error: " + err);
        }
    </script>
</body>
</html>
